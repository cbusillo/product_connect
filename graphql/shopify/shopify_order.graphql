fragment OrderLineItemFields on LineItem {
    id
    sku
    quantity
    name
    variant {
        id
    }
    originalUnitPriceSet {
        presentmentMoney { ...MoneyFields }
        shopMoney        { ...MoneyFields }
    }
    customAttributes { key value }
    discountAllocations {
        allocatedAmountSet {
            presentmentMoney { ...MoneyFields }
            shopMoney        { ...MoneyFields }
        }
    }
}

fragment ShippingLineFields on ShippingLine {
    id
    title
    carrierIdentifier
    code
    originalPriceSet {
        presentmentMoney { ...MoneyFields }
        shopMoney        { ...MoneyFields }
    }
    currentDiscountedPriceSet {
        presentmentMoney { ...MoneyFields }
        shopMoney        { ...MoneyFields }
    }
    deliveryCategory
    isRemoved

}

fragment TaxLineFields on TaxLine {
    title
    ratePercentage
    priceSet {
        presentmentMoney { ...MoneyFields }
        shopMoney        { ...MoneyFields }
    }
}

fragment OrderFields on Order {
    id
    name
    createdAt
    updatedAt
    processedAt
    closedAt
    cancelledAt
    currencyCode
    totalPriceSet      { presentmentMoney { ...MoneyFields } }
    subtotalPriceSet   { presentmentMoney { ...MoneyFields } }
    totalShippingPriceSet { presentmentMoney { ...MoneyFields } }
    customer           { ...CustomerFields }
    shippingAddress    { ...AddressFields }
    billingAddress     { ...AddressFields }
    lineItems(first: 250) { nodes { ...OrderLineItemFields } }
    shippingLines(first: 10) { nodes { ...ShippingLineFields } }
    totalDiscountsSet { presentmentMoney { ...MoneyFields } }
    taxLines { ...TaxLineFields }
    metafields(first: 15, namespace: "custom") { nodes { ...MetafieldFields } }
}

query GetOrderIds($cursor: String, $limit: Int!, $query: String) {
    orders(first: $limit, after: $cursor, query: $query, sortKey: UPDATED_AT) {
        pageInfo { hasNextPage endCursor }
        nodes    { id }
    }
}

query GetOrders($cursor: String, $limit: Int!, $query: String) {
    orders(first: $limit, after: $cursor, query: $query, sortKey: UPDATED_AT) {
        pageInfo { hasNextPage endCursor }
        nodes    { ...OrderFields }
    }
}