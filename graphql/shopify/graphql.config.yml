schema:
  - https://${SHOPIFY_STORE_URL_KEY}.myshopify.com/admin/api/${SHOPIFY_API_VERSION}/graphql.json:
      headers:
        X-Shopify-Access-Token: ${SHOPIFY_API_TOKEN}
      introspect: false
extensions:
  languageService:
    cacheSchemaFileForIntrospection: false
    enableValidation: true
    schemaFilePattern: "**/*.json"
include:
  - "*.graphql"
  - "**/*.graphql"