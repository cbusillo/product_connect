query GetProductIds($cursor: String, $limit: Int!, $query: String) {
    products(first: $limit, after: $cursor, query: $query) {
        pageInfo {
            hasNextPage
        }
        edges {
            cursor
            node {
                id
            }
        }
    }
}

query GetProducts($cursor: String, $limit: Int!, $query: String) {
    products(first: $limit, after: $cursor, query: $query) {
        pageInfo {
            hasNextPage
        }
        edges {
            cursor
            node {
                id
                title
                descriptionHtml
                vendor
                productType
                status
                totalInventory
                createdAt
                updatedAt
                media(first: 20) {
                    edges {
                        node {
                            preview {
                                image {
                                    url
                                }
                            }
                        }
                    }
                }
                variants(first: 1) {
                    edges {
                        node {
                            id
                            price
                            sku
                            barcode
                            inventoryItem {
                                unitCost {
                                    amount
                                    currencyCode
                                }
                                measurement {
                                    weight {
                                        value
                                    }
                                }
                            }

                        }
                    }
                }
                metafields(first: 15, namespace: "custom") {
                    edges {
                        node {
                            id
                            key
                            value
                        }
                    }
                }
            }
        }
    }
}

mutation ProductVariantsBulkCreate($productId: ID!, $strategy: ProductVariantsBulkCreateStrategy, $variants: [ProductVariantsBulkInput!]!) {
  productVariantsBulkCreate(productId: $productId, strategy: $strategy, variants: $variants) {
    productVariants {
      id
      inventoryItem {
        id
        measurement {
          weight {
            value
            unit
          }
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}

mutation DeleteProduct($input: ProductDeleteInput!) {
    productDelete(input: $input) {
        deletedProductId
        userErrors {
            field
            message
        }
    }
}

query GetOrdersLineItems($limit: Int!, $query: String!, $cursor: String) {
    orders(first: $limit, query: $query, after: $cursor) {
        edges {
            cursor
            node {
                id
                lineItems(first: 10) {
                    edges {
                        node {
                            id
                            product {
                                id
                            }
                        }
                    }
                }
            }
        }
        pageInfo {
            hasNextPage
        }
    }
}

mutation CreateProduct($input: ProductCreateInput!) {
    productCreate(product: $input) {
        product {
            id
            metafields(first: 15, namespace: "custom") {
                edges {
                    node {
                        id
                        key
                    }
                }
            }
        }
        userErrors {
            field
            message
        }
    }
}

mutation UpdateProduct($input: ProductUpdateInput!) {
    productUpdate(product: $input) {
        product {
            id
            metafields(first: 15, namespace: "custom") {
                edges {
                    node {
                        id
                        key
                    }
                }
            }
        }
        userErrors {
            field
            message
        }
    }
}



mutation createProductMedia($media: [CreateMediaInput!]!, $productId: ID!) {
    productCreateMedia(media: $media, productId: $productId) {
        media {
            alt
            mediaContentType
            status
        }
        mediaUserErrors {
            field
            message
        }
    }
}



query GetLocations {
    locations(first: 5) {
        edges {
            node {
                id
            }
        }
    }
}

mutation UpdatePublications($id: ID!, $input: [PublicationInput!]!) {
    publishablePublish(id: $id, input: $input) {
        userErrors {
            field
            message
        }
    }
}