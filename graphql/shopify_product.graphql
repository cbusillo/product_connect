query GetProductIds($cursor: String, $limit: Int!, $query: String) {
    products(first: $limit, after: $cursor, query: $query) {
        pageInfo {
            hasNextPage
            endCursor
        }
        edges {
            cursor
            node {
                id
            }
        }
    }
}

query GetProducts($cursor: String, $limit: Int!, $query: String) {
    products(first: $limit, after: $cursor, query: $query) {
        pageInfo {
            hasNextPage
            endCursor
        }
        edges {
            cursor
            node {
                id
                title
                descriptionHtml
                vendor
                productType
                status
                totalInventory
                createdAt
                updatedAt
                media(first: 20) {
                    edges {
                        node {
                            alt
                            preview {
                                image {
                                    url
                                }
                            }
                        }
                    }
                }
                variants(first: 1) {
                    edges {
                        node {
                            id
                            price
                            sku
                            barcode
                            inventoryItem {
                                unitCost {
                                    amount
                                    currencyCode
                                }
                                measurement {
                                    weight {
                                        value
                                    }
                                }
                            }

                        }
                    }
                }
                metafields(first: 15, namespace: "custom") {
                    edges {
                        node {
                            id
                            key
                            value
                        }
                    }
                }
            }
        }
    }
}

query GetLocations {
    locations(first: 5) {
        edges {
            node {
                id
            }
        }
    }
}
mutation ProductSet($identifier: ProductSetIdentifiers, $input: ProductSetInput!) {
    productSet(identifier: $identifier, input: $input) {
        product {
            id
            variants (first: 1) {
                edges {
                    node {
                        id
                    }
                }
            }
            metafields (first: 15, namespace: "custom") {
                edges {
                    node {
                        id
                        key
                    }
                }
            }
            resourcePublicationsV2(onlyPublished: true) {
                edges {
                    node {
                        publication {
                            id
                        }
                    }
                }
            }
        }
        userErrors {
            field
            message
        }
    }
}

mutation UpdatePublications($id: ID!, $input: [PublicationInput!]!) {
    publishablePublish(id: $id, input: $input) {
        userErrors {
            field
            message
        }
    }
}

mutation DeleteProduct($input: ProductDeleteInput!) {
    productDelete(input: $input) {
        deletedProductId
        userErrors {
            field
            message
        }
    }
}